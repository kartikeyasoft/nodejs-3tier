version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: magichub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: magichub-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: magicuser
      DB_PASSWORD: magicpass
      DB_NAME: magichub
      PORT: 5000
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: magichub-frontend
    restart: unless-stopped
    ports:
      - "8081:80"        # change host port if needed (e.g., "80:80")
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
